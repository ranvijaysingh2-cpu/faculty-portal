<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Portal — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    background: #0B0E3F;
    padding: 24px 20px;
  }

  /* ── Abstract fluid gradient background ── */
  .bg {
    position: fixed;
    inset: -20%;
    z-index: 0;
    background:
      radial-gradient(circle 700px at 15% 75%, rgba(255, 199, 0, 0.55) 0%, transparent 55%),
      radial-gradient(circle 900px at 85% 8%, rgba(20, 40, 255, 0.75) 0%, transparent 55%),
      radial-gradient(circle 500px at 70% 95%, rgba(255, 110, 10, 0.45) 0%, transparent 50%),
      radial-gradient(circle 750px at 3% 3%, rgba(55, 15, 240, 0.65) 0%, transparent 50%),
      radial-gradient(circle 1000px at 92% 80%, rgba(10, 20, 210, 0.65) 0%, transparent 55%),
      radial-gradient(circle 400px at 50% 50%, rgba(255, 199, 0, 0.1) 0%, transparent 60%);
    filter: blur(48px);
    animation: bgShift 14s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { transform: scale(1)    rotate(0deg); }
    100% { transform: scale(1.06) rotate(4deg); }
  }

  /* ── Glassmorphism card ── */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 360px;
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1.5px solid rgba(255, 255, 255, 0.32);
    border-radius: 28px;
    padding: 38px 32px 32px;
    box-shadow:
      0 24px 80px rgba(0, 0, 0, 0.22),
      inset 0 1.5px 0 rgba(255, 255, 255, 0.5),
      inset 0 -1px 0 rgba(255, 255, 255, 0.1);
    text-align: center;
  }

  /* ── Metallic PW coin ── */
  .coin-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }

  .pw-coin {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 36% 28%, #F8F8F8 0%, #D0D0D0 28%, #A0A0A0 55%, #686868 100%);
    box-shadow:
      0 0 0 3px rgba(255, 255, 255, 0.55),
      0 0 0 6px rgba(255, 255, 255, 0.15),
      0 10px 36px rgba(0, 0, 0, 0.5),
      inset 0 2px 0 rgba(255, 255, 255, 0.6),
      inset 0 -2px 0 rgba(0, 0, 0, 0.22);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .pw-coin::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 255, 255, 0.28);
  }

  .pw-coin-text {
    font-size: 20px;
    font-weight: 900;
    font-style: italic;
    color: #1a1a1a;
    letter-spacing: -1px;
    text-shadow: 0 1.5px 0 rgba(255, 255, 255, 0.45);
    position: relative;
    z-index: 1;
  }

  /* ── Brand name ── */
  .brand-name {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.2px;
    margin-bottom: 18px;
  }

  /* ── Heading ── */
  .portal-title {
    font-size: 34px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1.8px;
    line-height: 1.05;
    margin-bottom: 10px;
  }

  .portal-sub {
    font-size: 13.5px;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.7;
    margin-bottom: 26px;
  }

  /* ── Stats grid — like reference 144 / 604 / 44 ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }

  .stat-tile {
    background: rgba(255, 255, 255, 0.16);
    border: 1px solid rgba(255, 255, 255, 0.28);
    border-radius: 16px;
    padding: 14px 8px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1.2px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-lab {
    font-size: 10.5px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 0.1px;
  }

  /* ── Divider row (like social buttons row in reference) ── */
  .info-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .info-tile {
    background: rgba(255, 255, 255, 0.16);
    border: 1px solid rgba(255, 255, 255, 0.28);
    border-radius: 16px;
    padding: 14px 12px;
    display: flex;
    align-items: center;
    gap: 9px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .info-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .info-icon.secure { background: rgba(255, 199, 0, 0.25); }
  .info-icon.fast   { background: rgba(100, 180, 255, 0.25); }

  .info-icon svg { color: #fff; }

  .info-text {
    font-size: 12.5px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: -0.1px;
  }

  /* ── Google button — white pill (like reference's "Contact me") ── */
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 11px;
    width: 100%;
    padding: 16px 24px;
    background: #fff;
    border: none;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 700;
    color: #0B0E3F;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.3px;
    box-shadow:
      0 6px 28px rgba(0, 0, 0, 0.18),
      0 2px 6px rgba(0, 0, 0, 0.1);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    margin-bottom: 13px;
    outline: none;
  }

  .google-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 36px rgba(0, 0, 0, 0.22);
  }

  .google-btn:active {
    transform: translateY(0);
  }

  /* ── Note ── */
  .note {
    font-size: 11.5px;
    color: rgba(255, 255, 255, 0.45);
    text-align: center;
    letter-spacing: 0.1px;
  }

  .note strong {
    color: rgba(255, 255, 255, 0.7);
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- Fluid gradient background -->
<div class="bg"></div>

<!-- Card -->
<div class="card">

  <!-- PW Coin -->
  <div class="coin-wrap">
    <div class="pw-coin">
      <span class="pw-coin-text">PW</span>
    </div>
  </div>

  <div class="brand-name">Physics Wallah</div>

  <h1 class="portal-title">Faculty Portal.</h1>
  <p class="portal-sub">
    Securely access your result PDFs,<br>
    reports and resources.
  </p>

  <!-- Stats — matching reference layout (3 equal tiles) -->
  <div class="stats-grid">
    <div class="stat-tile">
      <div class="stat-num">2.4K+</div>
      <div class="stat-lab">Faculty</div>
    </div>
    <div class="stat-tile">
      <div class="stat-num">100K+</div>
      <div class="stat-lab">Reports</div>
    </div>
    <div class="stat-tile">
      <div class="stat-num">48</div>
      <div class="stat-lab">Batches</div>
    </div>
  </div>

  <!-- Info tiles — matching reference 2-column row -->
  <div class="info-row">
    <div class="info-tile">
      <div class="info-icon secure">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="info-text">Secure login</span>
    </div>
    <div class="info-tile">
      <div class="info-icon fast">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <span class="info-text">Instant access</span>
    </div>
  </div>

  <!-- White pill CTA — matching reference's "Contact me" button -->
  <button class="google-btn">
    <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0">
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    </svg>
    Continue with Google
  </button>

  <div class="note">Only <strong>@pw.live</strong> accounts are permitted.</div>

</div>

</body>
</html>
